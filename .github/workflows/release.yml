name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run tests
        run: go test ./... -v -race

      - name: Build release binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.Version=${VERSION}"

          GOOS=linux   GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/grit-linux-amd64   ./cmd/grit
          GOOS=linux   GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/grit-linux-arm64   ./cmd/grit
          GOOS=darwin  GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/grit-darwin-amd64  ./cmd/grit
          GOOS=darwin  GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/grit-darwin-arm64  ./cmd/grit
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/grit-windows-amd64.exe ./cmd/grit

          # Create tarballs for unix, zip for windows
          cd dist
          tar czf grit-linux-amd64.tar.gz  grit-linux-amd64
          tar czf grit-linux-arm64.tar.gz  grit-linux-arm64
          tar czf grit-darwin-amd64.tar.gz grit-darwin-amd64
          tar czf grit-darwin-arm64.tar.gz grit-darwin-arm64
          zip grit-windows-amd64.zip grit-windows-amd64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/grit-linux-amd64.tar.gz
            dist/grit-linux-arm64.tar.gz
            dist/grit-darwin-amd64.tar.gz
            dist/grit-darwin-arm64.tar.gz
            dist/grit-windows-amd64.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
